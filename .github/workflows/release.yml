name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Trigger on tags like v1.0.0
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1' # Using a fixed Gradle version to match AGP 9.1.1 requirements

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Extract Version Name
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION_NAME=dev-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
          fi

      - name: Build APK (Debug)
        # We build the Debug APK out-of-the-box because building a Release APK 
        # requires keystore configuration (signing keys) which are not committed to the repo.
        run: gradle assembleDebug -PVERSION_CODE=${{ github.run_number }} -PVERSION_NAME=${{ env.VERSION_NAME }}

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk DeviceRiskInspector.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeviceRiskInspector
          path: DeviceRiskInspector.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_NAME }}
          files: DeviceRiskInspector.apk
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
